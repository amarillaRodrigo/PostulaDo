name: CI - Strict

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: postulado/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: postulado

      - name: Audit dependencies (fail on moderate+)
        run: npm audit --audit-level=moderate
        working-directory: postulado

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: postulado
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Lint
        run: npm run lint
        working-directory: postulado

      - name: Run tests
        run: npm test --silent
        working-directory: postulado

      - name: Generate OpenAPI spec
        run: npm run generate:swagger
        working-directory: postulado

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-json
          path: postulado/docs/openapi.json
