name: CI - Strict

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postulado_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Debug: list workspace and check postulado folder
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          ls -la
          echo "--- postulado ---"
          ls -la postulado || echo "postulado folder missing"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: postulado/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: postulado

      - name: Audit dependencies (fail on moderate+)
        run: npm audit --audit-level=moderate
        working-directory: postulado

      - name: Wait for Postgres
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 && break || sleep 1
          done
        shell: bash

      - name: Generate Prisma Client
        run: npx prisma generate
        working-directory: postulado

      - name: Push Prisma schema to DB
        run: npx prisma db push --schema prisma/schema.prisma --accept-data-loss
        working-directory: postulado
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postulado_test?schema=public"


      - name: Lint
        run: npm run lint
        working-directory: postulado

      - name: Run unit tests
        run: npm test --silent
        working-directory: postulado

      - name: Run e2e tests
        run: npm run test:e2e --silent
        working-directory: postulado
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postulado_test?schema=public"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"

      - name: Run integration tests
        run: npm run test:integration --silent
        working-directory: postulado
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postulado_test?schema=public"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"

      - name: Generate OpenAPI spec
        run: npm run generate:swagger
        working-directory: postulado
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/postulado_test?schema=public"
          JWT_SECRET: "${{ secrets.JWT_SECRET }}"

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-json
          path: postulado/docs/openapi.json
