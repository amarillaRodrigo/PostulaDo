services:
  db:
    image: postgres:15-alpine
    container_name: postulado-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postulado_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d postulado_test"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis-test:
    image: redis:7-alpine
    container_name: postulado-redis-test
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10