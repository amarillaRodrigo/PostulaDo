services:
  db:
    image: postgres:15-alpine
    container_name: postulado-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: postulado_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d postulado_test"]
      interval: 5s
      timeout: 5s
      retries: 10